<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
        <nav class="site-nav">
          <ul>
            {% for item in site.nav %}
              {% assign current = false %}
              {% if page.url == item.url %}{% assign current = true %}{% endif %}
              <li{% if current %} class="active"{% endif %}>
                <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
              </li>
            {% endfor %}
          </ul>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        &copy; {{ 'now' | date: "%Y" }} {{ site.author | default: site.title }}
      </footer>
    </div>
  </body>
</html>
